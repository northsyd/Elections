<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Election Results</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f3f4f6;
    margin: 0;
    color: #111827;
}

header {
    background: #111827;
    color: white;
    padding: 25px;
}

h1 {
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

select {
    padding: 10px;
    font-size: 16px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 2px 8px #0002;
}

.winner {
    font-size: 28px;
    font-weight: bold;
}

.badge {
    background: #374151;
    color: white;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 12px;
}

.candidate {
    margin: 15px 0;
}

.bar {
    height: 25px;
    border-radius: 5px;
    color:white;
    padding-left:8px;
    line-height:25px;
    font-size:14px;
}

.row {
    display:flex;
    justify-content:space-between;
}

.positive {
    color: green;
}

.negative {
    color:red;
}

.seat {
    display:inline-block;
    padding:12px;
    margin:5px;
    border-radius:8px;
    color:white;
    min-width:120px;
    text-align:center;
}

.count {
    border-left:4px solid #9ca3af;
    padding-left:15px;
    margin:10px 0;
}

</style>

</head>

<body>

<header>
<h1>Election Results Dashboard</h1>
</header>


<div class="container">

<select id="roleSelect"></select>


<div id="content"></div>


<h2>Parliament / Committee</h2>

<div class="card" id="parliament"></div>


</div>


<script>


let results={};


fetch("results.json")
.then(r=>r.json())
.then(data=>{

    results=data;

    let select=document.getElementById("roleSelect");

    Object.keys(results).forEach(role=>{

        let option=document.createElement("option");

        option.value=role;
        option.textContent=role;

        select.appendChild(option);

    });


    select.onchange=()=>showRole(select.value);


    showRole(Object.keys(results)[0]);


    buildParliament();

});




function showRole(role){


let data=results[role];


let html=`


<div class="card">

<h2>${role}</h2>


<div class="winner">
Winner: ${data.winner}
</div>

</div>


<div class="card">

<h2>First Preferences</h2>

`;


Object.entries(data.first_percent)

.sort((a,b)=>b[1]-a[1])

.forEach(([name,value])=>{


let c=data.candidates[name];


html+=`

<div class="candidate">

<div class="row">

<span>
${name}

${c.incumbent ? '<span class="badge">EC</span>' : ''}

<br>

<small>${c.party}</small>

</span>

<b>${value}%</b>

</div>


<div class="bar"
style="width:${value}%;background:${c.colour}">
</div>


</div>

`;

});


html+=`

</div>


<div class="card">

<h2>Primary Vote Swing</h2>

`;



Object.entries(data.primary_swing)

.forEach(([name,value])=>{


html+=`

<div class="row">

<span>${name}</span>

<span class="${value>=0?'positive':'negative'}">

${value>0?"+":""}${value}%

</span>

</div>

`;

});


html+=`

</div>


<div class="card">

<h2>2PP</h2>

`;


Object.entries(data.two_pp)

.forEach(([name,value])=>{


html+=`

<div class="candidate">

<div class="row">

<span>${name}</span>

<b>${value}%</b>

</div>


<div class="bar"
style="width:${value}%;background:${data.candidates[name]?.colour || '#555'}">

</div>

</div>

`;

});


if(data.two_pp_swing !== null){

html+=`

<p>

2PP Swing:

<b class="${data.two_pp_swing>=0?'positive':'negative'}">

${data.two_pp_swing>0?"+":""}${data.two_pp_swing}%

</b>

</p>

`;

}


html+=`

</div>



<div class="card">

<h2>Preference Count</h2>

`;


data.history.forEach((round,index)=>{


html+=`

<div class="count">

<b>Count ${index+1}</b>

`;

    Object.entries(round)

.forEach(([name,v])=>{

let total = Object.values(round)
.reduce((a,b)=>a+b,0);

let percent = ((v / total) * 100).toFixed(1);


html+=`

<div class="row">

<span>${name}</span>

<span>${v} (${percent}%)</span>

</div>

`;

});


html+=`</div>`;


});


html+=`</div>`;


document.getElementById("content").innerHTML=html;


}






function buildParliament(){


let box=document.getElementById("parliament");


Object.entries(results).forEach(([role,data])=>{


let c=data.candidates[data.winner];


box.innerHTML+=`

<div class="seat"
style="background:${c.colour}">

<b>${data.winner}</b>
<br>

${role}

</div>

`;


});


}


</script>


</body>
</html>
