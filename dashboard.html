<!DOCTYPE html>
<html>

<head>

<title>NSTA Election Centre</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {

    background:#0b1220;
    color:white;
    font-family:Arial, sans-serif;
    margin:40px;

}


h1 {

    font-size:48px;

}


select {

    font-size:22px;
    padding:10px;
    border-radius:10px;

}



.card {

    background:#172033;
    border-radius:18px;
    padding:25px;
    margin:25px 0;

}



.result {

    display:flex;
    justify-content:space-between;
    align-items:center;

}



.winner {

    font-size:42px;
    font-weight:bold;

}



.badge {

    background:#16a34a;
    padding:12px 20px;
    border-radius:20px;
    font-weight:bold;

}



canvas {

    max-height:350px;

}



.twoPP {

    display:flex;
    height:55px;
    border-radius:30px;
    overflow:hidden;

}



.side {

    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;

}



#sankey {

    width:100%;
    height:500px;

}



.parliament {

    display:flex;
    flex-wrap:wrap;
    justify-content:center;

}



.seat {

    width:100px;
    height:100px;
    border-radius:50%;
    margin:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;
    font-size:14px;
    font-weight:bold;

}



</style>

</head>



<body>


<h1>NSTA Election Centre</h1>



<select id="roleSelect"></select>





<div class="card">


<div class="result">


<div>

<div class="badge">
ELECTED
</div>


<div class="winner" id="winner">
</div>


</div>


<div id="role">

</div>


</div>


</div>






<div class="card">

<h2>First Preferences</h2>

<canvas id="firstChart"></canvas>

</div>






<div class="card">

<h2>Two Candidate Preferred</h2>


<div class="twoPP" id="twopp"></div>


<p id="margin"></p>


</div>







<div class="card">

<h2>First Preference Swing</h2>


<canvas id="swingChart"></canvas>


</div>













<div class="card">


<h2>Committee</h2>


<div class="parliament" id="committee"></div>


</div>









<script>


let results;


let firstChart;
let swingChart;



fetch("results.json")


.then(r=>r.json())


.then(data=>{


results=data;


let selector =
document.getElementById("roleSelect");



Object.keys(results).forEach(role=>{


let option =
document.createElement("option");


option.value=role;

option.textContent=role;


selector.appendChild(option);


});



selector.onchange=()=>{

showRole(selector.value);

};



showRole(
Object.keys(results)[0]
);



});









function showRole(role){



let data =
results[role];



document.getElementById("winner").innerHTML =
data.winner;


document.getElementById("role").innerHTML =
role;





if(firstChart)
firstChart.destroy();


if(swingChart)
swingChart.destroy();







//
// FIRST PREFS
//


let names =
Object.keys(data.first_percent);



firstChart = new Chart(

document.getElementById("firstChart"),

{


type:"bar",


data:{


labels:names,


datasets:[{


label:"First Preference %",


data:Object.values(data.first_percent),



backgroundColor:names.map(

n=>data.candidates[n]?.colour || "#64748b"

)


}]

},


options:{

scales:{

y:{

beginAtZero:true,

max:100

}

}

}


}


);








//
// SWING
//


swingChart = new Chart(

document.getElementById("swingChart"),

{


type:"bar",


data:{


labels:Object.keys(data.swing),


datasets:[{


label:"Swing %",


data:Object.values(data.swing),


backgroundColor:Object.keys(data.swing).map(

n=>data.candidates[n]?.colour || "#64748b"

)


}]

}


}


);









//
// 2PP
//


let finalNames =
Object.keys(data.final_count);


let finalVotes =
Object.values(data.final_count);



let total =
finalVotes.reduce(
(a,b)=>a+b
);



let box =
document.getElementById("twopp");


box.innerHTML="";



finalNames.forEach((name,index)=>{


let percent =
finalVotes[index]/total*100;



let div =
document.createElement("div");


div.className="side";


div.style.width =
percent+"%";


div.style.background =
data.candidates[name]?.colour || "#64748b";


div.innerHTML =
name+" "+percent.toFixed(1)+"%";



box.appendChild(div);



});




document.getElementById("margin").innerHTML =

"Margin: "+
Math.abs(
(finalVotes[0]-finalVotes[1])
/total*100
).toFixed(1)
+"%";









//
// SANKEY
//

<div class="card">

<h2>Count History</h2>

<div id="history"></div>

</div>







//
// COMMITTEE
//

drawCommittee();



}









function drawSankey(data){



let svg =
d3.select("#sankey");



svg.selectAll("*").remove();



if(!data.flows.length){

return;

}



let names = [

...new Set(

data.flows.flatMap(

f=>[f.from,f.to]

)

)

];




let nodes =
names.map(
name=>({name:name})
);




let links =
data.flows.map(
f=>({

source:names.indexOf(f.from),

target:names.indexOf(f.to),

value:f.votes

})

);





let sankey =
d3.sankey()

.nodeWidth(25)

.nodePadding(30)

.extent(

[
[20,20],
[900,450]
]

);




let graph =
sankey({

nodes:nodes,

links:links

});





svg.append("g")

.selectAll("path")

.data(graph.links)

.enter()

.append("path")

.attr(

"d",

d3.sankeyLinkHorizontal()

)

.attr(

"stroke",

"#94a3b8"

)

.attr(

"stroke-width",

d=>Math.max(2,d.width)

)

.attr(

"fill",

"none"

)

.attr(

"opacity",

0.6

);






let node =
svg.append("g")

.selectAll("g")

.data(graph.nodes)

.enter()

.append("g");





node.append("rect")

.attr(

"x",

d=>d.x0

)

.attr(

"y",

d=>d.y0

)

.attr(

"width",

d=>d.x1-d.x0

)

.attr(

"height",

d=>d.y1-d.y0

)

.attr(

"fill",

d=>data.candidates[d.name]?.colour || "#64748b"

);





node.append("text")

.attr(

"x",

d=>d.x0-6

)

.attr(

"y",

d=>(d.y0+d.y1)/2

)

.attr(

"text-anchor",

"end"

)

.text(

d=>d.name

)

.style(

"fill",

"white"

);



}










function drawCommittee(){



let box =
document.getElementById("committee");



box.innerHTML="";



Object.keys(results).forEach(role=>{


let winner =
results[role].winner;



let seat =
document.createElement("div");



seat.className="seat";


seat.style.background =
results[role].candidates[winner]?.colour
|| "#64748b";



seat.innerHTML =
role+
"<br>"+
winner;



box.appendChild(seat);



});


}



</script>


</body>

</html>
